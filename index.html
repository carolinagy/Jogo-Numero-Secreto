<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo Número Secreto</title>
  <style>

    :root {
      --roxo: #41149E;
      --roxo-escuro: #2a0d6b;
      --roxo-claro: #7c3aed;
      --branco: #ffffff;
      --cinza-claro: #f3f0ff;
      --quente: #e05c00;
      --frio: #1a7abf;
      --acerto: #2a9d3f;
      --erro: #c0392b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--cinza-claro);
      background-image:
        radial-gradient(ellipse at 80% 100%, #c9b8f5 0%, transparent 60%),
        radial-gradient(ellipse at 20% 90%, #b8d8f5 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, cursive;
      padding: 20px;
    }

    .card {
      background: var(--branco);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(65, 20, 158, 0.15);
      padding: 40px 36px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .gato {
      width: 150px;
      margin: 20px auto 0;
      display: block;
    }

    h1 {
      color: var(--roxo);
      font-size: 1.7rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .subtitulo {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .tentativas {
      display: inline-block;
      background: var(--cinza-claro);
      color: var(--roxo);
      border-radius: 99px;
      padding: 4px 16px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      min-width: 0; /* garante que o input possa encolher corretamente */
    }

    input[type="number"] {
      flex: 1;
      min-width: 0; /* permite que placeholder não seja cortado em flexbox */
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 1.1rem;
      color: var(--roxo-escuro);
      outline: none;
    }

    input[type="number"]:focus {
      border-color: var(--roxo-claro);
    }

    /* Remove setas do input number */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    .btn-palpite {
      background: var(--roxo);
      color: var(--branco);
      border: none;
      border-radius: 12px;
      padding: 12px 22px;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-palpite:hover { background: var(--roxo-claro); }
    .btn-palpite:active { transform: scale(0.150); }

    .mensagem {
      min-height: 60px;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .mensagem.quente  { background: #fff3e0; color: var(--quente); }
    .mensagem.frio    { background: #e3f2fd; color: var(--frio); }
    .mensagem.acerto  { background: #e8f5e9; color: var(--acerto); }
    .mensagem.neutro  { background: var(--cinza-claro); color: #555; }

    .btn-reiniciar {
      margin-top: 16px;
      background: transparent;
      color: var(--roxo);
      border: 2px solid var(--roxo);
      border-radius: 12px;
      padding: 10px 24px;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: none;
    }

    .btn-reiniciar.visivel { display: inline-block; }
    .btn-reiniciar:hover { background: var(--roxo); color: var(--branco); }

    .historico {
      margin-top: 20px;
      text-align: left;
    }

    .historico h3 {
      font-size: 0.85rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .historico-lista {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .historico-lista span {
      background: var(--cinza-claro);
      border-radius: 8px;
      padding: 3px 12px;
      font-size: 0.9rem;
      color: var(--roxo-escuro);
      font-weight: 600;
    }

  </style>
</head>
<body>

  <div class="card">
    <img
      class="gato"
      src="https://www.publicdomainpictures.net/pictures/480000/nahled/katze-silhouette-clipart-png-1668737284pHW.png"
      alt="Gato preto"
    />
    <h1>Número Secreto</h1>
    <p class="subtitulo">Adivinhe o número entre <strong>1</strong> e <strong>10</strong></p>

    <div class="tentativas" id="tentativas">Tentativas: 0</div>

    <div class="input-area">
      <input type="number" id="palpite" min="1" max="10" placeholder="Seu palpite..." />
      <button class="btn-palpite" id="btnTentar">Tentar</button>
    </div>

    <div class="mensagem neutro" id="mensagem">
      Digite um número e clique em Tentar!
    </div>

    <button class="btn-reiniciar" id="btnReiniciar">Jogar de novo</button>

    <div class="historico" id="historicoArea" style="display:none">
      <h3>Tentativas feitas</h3>
      <div class="historico-lista" id="historicoLista"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
